<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in – Google Accounts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #202124;
    }
    .card {
      width: 448px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 48px 40px 36px;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo svg { width: 75px; height: 24px; }
    h1 {
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 16px;
      color: #202124;
      text-align: center;
      margin-bottom: 32px;
    }
    .input-group {
      position: relative;
      margin-bottom: 28px;
    }
    .input-group input {
      width: 100%;
      padding: 13px 15px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 16px;
      outline: none;
      color: #202124;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: #1a73e8;
      border-width: 2px;
    }
    .input-group label {
      position: absolute;
      top: 50%;
      left: 15px;
      transform: translateY(-50%);
      font-size: 16px;
      color: #5f6368;
      pointer-events: none;
      transition: all 0.15s;
      background: #fff;
      padding: 0 4px;
    }
    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: 0;
      font-size: 12px;
      color: #1a73e8;
    }
    .forgot {
      font-size: 14px;
      color: #1a73e8;
      text-decoration: none;
      display: block;
      margin-bottom: 28px;
    }
    .forgot:hover { text-decoration: underline; }
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .create-account {
      font-size: 14px;
      color: #1a73e8;
      text-decoration: none;
    }
    .create-account:hover { text-decoration: underline; }
    .next-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: .25px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .next-btn:hover {
      background: #1765cc;
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    .divider {
      border: none;
      border-top: 1px solid #dadce0;
      margin: 32px 0 20px;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .lang-select {
      font-size: 13px;
      color: #5f6368;
      border: none;
      background: transparent;
      cursor: pointer;
    }
    .footer-links {
      display: flex;
      gap: 16px;
    }
    .footer-links a {
      font-size: 13px;
      color: #5f6368;
      text-decoration: none;
    }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <!-- Google logo SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 92">
        <path fill="#EA4335" d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
        <path fill="#FBBC05" d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
        <path fill="#4285F4" d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.67-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.26zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z"/>
        <path fill="#34A853" d="M225 3v65h-9.5V3h9.5z"/>
        <path fill="#EA4335" d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z"/>
        <path fill="#4285F4" d="M35.29 41.41V32h31.3c.31 1.64.47 3.58.47 5.68 0 7.06-1.93 15.79-8.15 22.01-6.05 6.3-13.78 9.66-24.02 9.66C16.32 69.35.36 53.89.36 35.29.36 16.69 16.32 1.23 34.89 1.23c10.5 0 17.98 4.12 23.6 9.49l-6.64 6.64c-4.03-3.78-9.49-6.72-16.97-6.72-13.86 0-24.7 11.17-24.7 25.03 0 13.86 10.84 25.03 24.7 25.03 8.99 0 14.11-3.61 17.39-6.89 2.66-2.66 4.41-6.46 5.1-11.65l-22.08.25z"/>
      </svg>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">to continue to Data Studio</p>

    <form onsubmit="return false;">
      <div class="input-group">
        <input type="email" id="email" placeholder=" " autocomplete="email">
        <label for="email">Email or phone</label>
      </div>

      <a href="#" class="forgot">Forgot email?</a>

      <p style="font-size:14px;color:#5f6368;margin-bottom:20px;">
        Not your computer? Use a private browsing window to sign in.
        <a href="#" style="color:#1a73e8;text-decoration:none;">Learn more</a>
      </p>

      <div class="actions">
        <a href="#" class="create-account">Create account</a>
        <button class="next-btn" type="submit">Next</button>
      </div>
    </form>

    <hr class="divider">

    <div class="footer">
      <select class="lang-select">
        <option>English (United States)</option>
      </select>
      <div class="footer-links">
        <a href="#">Help</a>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
      </div>
    </div>
  </div>
</body>
</html>
